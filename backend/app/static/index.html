<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessLens | Matrix HUD</title>
    <style>
        :root {
            --brand-500: #06b6d4;
            --brand-600: #0891b2;
            --slate-900: #0f172a;
            --slate-950: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--slate-950);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .background {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
        }

        .grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .hud-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            border-radius: 40px;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: perspective(1000px) rotateX(2deg);
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: perspective(1000px) rotateX(2deg) scale(1); }
            50% { transform: perspective(1000px) rotateX(4deg) scale(1.02); }
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom right, #fff, #64748b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .logo span {
            color: var(--brand-500);
            -webkit-text-fill-color: var(--brand-500);
        }

        .tagline {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: #64748b;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .status-item {
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .status-label {
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #475569;
            display: block;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1rem;
            font-weight: 700;
            color: #cbd5e1;
        }

        .status-value.online {
            color: var(--brand-500);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        a.btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: var(--brand-500);
            color: var(--slate-950);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            background: #22d3ee;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(6, 182, 212, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grid"></div>

    <div class="hud-container">
        <h1 class="logo">ACCESS<span>LENS</span></h1>
        <div class="tagline">Hyper-Matrix AX Intelligence</div>

        <div class="status-grid">
            <div class="status-item">
                <span class="status-label">System Core</span>
                <span class="status-value online">OPERATIONAL</span>
            </div>
            <div class="status-item">
                <span class="status-label">API Version</span>
                <span class="status-value">v1.0.0-PRO</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="/docs" class="btn btn-primary">Open Documentation</a>
            <a href="/api/v1/engines" class="btn btn-secondary">Registry</a>
        </div>
    </div>

    <div class="footer">Secure Interface • All Systems Nominal</div>
</body>
</html>
